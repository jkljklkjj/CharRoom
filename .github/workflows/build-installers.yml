name: Build native installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main

jobs:
  build-windows:
    name: Build MSI (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare icons (Windows)
        shell: powershell
        run: |
          $icons = "packaging/icons"
          if (-Not (Test-Path $icons)) { Write-Host "No icons folder found: $icons"; exit 0 }
          $png = Join-Path $icons 'app.png'
          $pngb64 = Join-Path $icons 'app.png.b64'
          $ico = Join-Path $icons 'app.ico'
          $svg = Join-Path $icons 'app.svg'
          # If SVG exists, prefer converting it to PNG first
          if (-Not (Test-Path $png) -and (Test-Path $svg)) {
            choco install imagemagick -y
            Write-Host "Generating $png from $svg"
            magick convert $svg $png
          }
          # Fallback: decode base64 PNG if provided
          if (-Not (Test-Path $png) -and (Test-Path $pngb64)) {
            Write-Host "Decoding base64 png to $png"
            [IO.File]::WriteAllBytes($png, [Convert]::FromBase64String((Get-Content $pngb64 -Raw)))
          }
          if (-Not (Test-Path $ico) -and (Test-Path $png)) {
            choco install imagemagick -y
            Write-Host "Generating $ico from $png"
            magick convert $png -define icon:auto-resize=256,128,64,48,32,16 $ico
          } else { Write-Host "Icon already exists or png missing" }

      - name: Install WiX (choco)
        run: choco install wixtoolset -y

      - name: Build installers
        run: .\gradlew.bat clean buildInstallers --no-daemon

      - name: Optional code signing (Windows)
        shell: powershell
        env:
          WINDOWS_PFX: ${{ secrets.WINDOWS_PFX }}
          WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_PFX -or -not $env:WINDOWS_PFX_PASSWORD) {
            Write-Host 'Skipping Windows code signing: secrets not provided.'
            exit 0
          }
          $pfxPath = Join-Path $env:TEMP 'codesign.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_PFX))
          $pw = $env:WINDOWS_PFX_PASSWORD
          certutil -f -p $pw -importpfx $pfxPath
          $signtool = '"C:\Program Files (x86)\Windows Kits\10\bin\x64\signtool.exe"'
          Get-ChildItem -Path build\compose\binaries -Recurse -Include *.msi | ForEach-Object {
            & $signtool sign /fd SHA256 /a /f $pfxPath /p $pw /tr http://timestamp.digicert.com /td SHA256 $_.FullName
          }

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            build/compose/binaries/**
            build/**/distributions/**
            build/**/*.msi

  build-macos:
    name: Build DMG (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare icons (macOS)
        run: |
          ICON_DIR=packaging/icons
          if [ ! -d "$ICON_DIR" ]; then
            echo "No icon dir: $ICON_DIR"; exit 0
          fi
          if [ -f "$ICON_DIR/app.icns" ]; then
            echo "app.icns exists"
          else
            # If app.svg is provided, convert it to app.png (prefer SVG)
            if [ ! -f "$ICON_DIR/app.png" ] && [ -f "$ICON_DIR/app.svg" ]; then
              echo "Converting app.svg -> app.png"
              brew install imagemagick || true
              magick convert "$ICON_DIR/app.svg" "$ICON_DIR/app.png" || true
            fi
            # decode base64 if present
            if [ ! -f "$ICON_DIR/app.png" ] && [ -f "$ICON_DIR/app.png.b64" ]; then
              echo "Decoding app.png from base64"
              base64 --decode "$ICON_DIR/app.png.b64" > "$ICON_DIR/app.png"
            fi
            if [ -f "$ICON_DIR/app.png" ]; then
              echo "Generating app.icns from app.png"
              rm -rf "$ICON_DIR/App.iconset" || true
              mkdir -p "$ICON_DIR/App.iconset"
              sips -z 16 16 "$ICON_DIR/app.png" --out "$ICON_DIR/App.iconset/icon_16x16.png"
              sips -z 32 32 "$ICON_DIR/app.png" --out "$ICON_DIR/App.iconset/icon_16x16@2x.png"
              sips -z 32 32 "$ICON_DIR/app.png" --out "$ICON_DIR/App.iconset/icon_32x32.png"
              sips -z 64 64 "$ICON_DIR/app.png" --out "$ICON_DIR/App.iconset/icon_32x32@2x.png"
              sips -z 128 128 "$ICON_DIR/app.png" --out "$ICON_DIR/App.iconset/icon_128x128.png"
              sips -z 256 256 "$ICON_DIR/app.png" --out "$ICON_DIR/App.iconset/icon_128x128@2x.png"
              sips -z 256 256 "$ICON_DIR/app.png" --out "$ICON_DIR/App.iconset/icon_256x256.png"
              sips -z 512 512 "$ICON_DIR/app.png" --out "$ICON_DIR/App.iconset/icon_256x256@2x.png"
              sips -z 512 512 "$ICON_DIR/app.png" --out "$ICON_DIR/App.iconset/icon_512x512.png"
              sips -z 1024 1024 "$ICON_DIR/app.png" --out "$ICON_DIR/App.iconset/icon_512x512@2x.png"
              iconutil -c icns "$ICON_DIR/App.iconset" -o "$ICON_DIR/app.icns" || true
              rm -rf "$ICON_DIR/App.iconset"
            else
              echo "No app.png to generate icons"
            fi
          fi

      - name: Make gradlew executable
        run: chmod +x gradlew
        shell: bash

      - name: Build installers
        run: ./gradlew clean buildInstallers
        shell: bash

      - name: Optional sign & notarize (macOS)
        shell: bash
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
          APPLE_ISSUER_ID: ${{ secrets.APPLE_ISSUER_ID }}
          MACOS_IDENTITY: ${{ secrets.MACOS_IDENTITY }}
        run: |
          set -e
          if [ -z "$APPLE_API_KEY_BASE64" ] || [ -z "$APPLE_KEY_ID" ] || [ -z "$APPLE_ISSUER_ID" ]; then
            echo "Skipping macOS sign & notarize: required secrets not provided."
            exit 0
          fi
          echo "Decoding Apple API key"
          echo "$APPLE_API_KEY_BASE64" | base64 --decode > apple_api_key.p8
          ARTIFACT=$(find build/compose/binaries -type f -name "*.dmg" | head -n 1 || true)
          if [ -n "$ARTIFACT" ]; then
            echo "Found dmg: $ARTIFACT"
            # Optional signing step: requires MACOS_IDENTITY secret
            if [ -n "$MACOS_IDENTITY" ]; then
              echo "Signing app inside DMG (best-effort)"
              TMPMOUNT=$(mktemp -d)
              hdiutil attach "$ARTIFACT" -mountpoint "$TMPMOUNT" -nobrowse
              APP_PATH=$(find "$TMPMOUNT" -maxdepth 2 -name "*.app" | head -n 1 || true)
              if [ -n "$APP_PATH" ]; then
                codesign --timestamp --options runtime --sign "$MACOS_IDENTITY" "$APP_PATH"
              fi
              hdiutil detach "$TMPMOUNT" || true
            fi
            # Notarize using xcrun notarytool
            xcrun notarytool submit "$ARTIFACT" --key apple_api_key.p8 --key-id "$APPLE_KEY_ID" --issuer "$APPLE_ISSUER_ID" --wait
            xcrun stapler staple "$ARTIFACT" || true
          else
            echo "No DMG found to notarize"
          fi

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: macos-installers
          path: build/compose/binaries/**

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-installers
          path: artifacts/windows

      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-installers
          path: artifacts/macos

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: "build-${{ github.run_id }}"
          release_name: "CharRoom build ${{ github.run_id }}"
          body: "Automated build artifacts"
          draft: false
          prerelease: false

      - name: Upload artifacts to Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          upload_url=${{ steps.create_release.outputs.upload_url }}
          upload_url="${upload_url%\{*}"
          echo "Upload URL: $upload_url"
          find artifacts -type f -maxdepth 4 | while read -r file; do
            name=$(basename "$file")
            echo "Uploading $name"
            curl -s -H "Authorization: token $GITHUB_TOKEN" -H "Content-Type: application/octet-stream" --data-binary @"$file" "$upload_url?name=$name"
          done
