syntax = "proto3";

package com.chatlite.proto;

option java_package = "com.chatlite.proto";
option java_outer_classname = "MessageProtos";
option java_multiple_files = false;

// 消息类型枚举
enum MessageType {
    TEXT = 0;  // 文本消息
    IMAGE = 1; // 图片消息
    FILE = 2;  // 文件消息
}

// 登录消息
message LoginMessage {
    string targetClientId = 1;  // 通过token和redis获取的客户端ID
}

// 聊天消息
message ChatMessage {
    string targetClientId = 1;  // 目标客户端ID
    string content = 2;       // 消息内容
    string userId = 3;        // 发送者用户ID
    string timestamp = 4;      // 时间戳
    string messageId = 5;      // 消息唯一ID（用于ACK确认）
    repeated ClientAction clientActions = 6; // 可选的行为序列

    // 引用回复相关字段
    string replyToMessageId = 7;  // 引用的消息ID
    string replyToContent = 8;    // 引用的消息内容预览
    string replyToSender = 9;     // 引用消息的发送者名称

    // 文件消息相关字段
    MessageType messageType = 10;  // 消息类型
    string fileUrl = 11;          // 文件/图片URL
    string fileName = 12;         // 文件名称
    int64 fileSize = 13;          // 文件大小
}

// 群聊消息
message GroupChatMessage {
    string targetClientId = 1;  // 群组ID
    string content = 2;       // 消息内容
    string userId = 3;        // 发送者用户ID
    string messageId = 4;      // 消息唯一ID（用于ACK确认）

    // 引用回复相关字段
    string replyToMessageId = 5;  // 引用的消息ID
    string replyToContent = 6;    // 引用的消息内容预览
    string replyToSender = 7;     // 引用消息的发送者名称

    // 文件消息相关字段
    MessageType messageType = 8;  // 消息类型
    string fileUrl = 9;          // 文件/图片URL
    string fileName = 10;         // 文件名称
    int64 fileSize = 11;          // 文件大小
}

// 客户端行为描述
message ClientAction {
    string id = 1;
    int64 timestamp = 2;
    string type = 3;
    string targetId = 4;
    map<string, string> metadata = 5;
}

// Agent 聊天消息
message AgentChatMessage {
    string targetClientId = 1;  // 目标客户端ID
    string content = 2;       // 消息内容
    string userId = 3;        // 发送者用户ID
    string timestamp = 4;      // 时间戳
    repeated ClientAction clientActions = 5; // 可选的行为序列
}

// Agent 流式消息
message AgentStreamMessage {
    string chunk = 1;         // 流式输出片段
    bool done = 2;            // 是否为流结束标记
    bool error = 3;           // 是否为错误消息
    string message = 4;       // 错误或结束说明
    string messageId = 5;     // 可选的客户端调用关联ID
}

// 检查在线状态消息
message CheckMessage {
    string targetClientId = 1;  // 要检查的客户端ID
}

// 心跳消息
message HeartbeatMessage {
    // 心跳消息可以包含一些状态信息
    int64 timestamp = 1;  // 时间戳
}

// 登出消息
message LogoutMessage {
    string userId = 1;  // 用户ID
}

// ACK确认消息
message AckMessage {
    string messageId = 1;  // 要确认的消息ID
    string userId = 2;     // 用户ID
}

// 通用消息包装器
message MessageWrapper {
    string type = 1;  // 消息类型: login, chat, agentChat, groupChat, check, heartbeat, logout, agentChatStream, ack

    oneof payload {
        LoginMessage login = 2;
        ChatMessage chat = 3;
        AgentChatMessage agentChat = 9;
        GroupChatMessage groupChat = 4;
        CheckMessage check = 5;
        HeartbeatMessage heartbeat = 6;
        LogoutMessage logout = 7;
        AgentStreamMessage agentStream = 8;
        AckMessage ack = 10;
    }
}

// 响应消息
message ResponseMessage {
    string message = 1;      // 响应消息
    bool success = 2;       // 是否成功
    string clientId = 3;     // 客户端ID (用于CheckMessage响应)
    bool online = 4;        // 是否在线 (用于CheckMessage响应)
}
